spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
server:
  port: ${SERVER_PORT:8099}
app:
  openapi:
    server-url: ${OPENAPI_SERVER_URL}
    server-description: UAT Server
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  upload:
    directory: ${UPLOAD_DIR:/opt/prpo/uploads}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:noreply@prpo-system.com}
logging:
  level:
    com.jirapat.prpo.api: INFO
    org.springframework.security: WARN
  file:
    name: logs/application.log
