# ============================================
# Common Settings
# ============================================
spring:
  application:
    name: purchase-system
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:15MB}
  flyway:
    enabled: true
    locations: classpath:db/migration
# ============================================

# App Settings
# ============================================
app:
  company:
    name: PRPO System
    email: support@jrppor.com
    url: https://jrppor.com
  cors:
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - X-Requested-With
    allow-credentials: true
    max-age: 3600
  mail:
    enabled: false
    from: noreply@prpo-system.com
    subject-prefix: "[PRPO] "
  rate-limit:
    enabled: true
    general:
      capacity: 100
      refill-tokens: 100
      refill-duration-seconds: 60
    auth:
      capacity: 10
      refill-tokens: 10
      refill-duration-seconds: 60
  upload:
    directory: ${UPLOAD_DIR:./uploads}
    max-file-size: ${UPLOAD_MAX_SIZE:10485760} # 10 MB
    max-files-per-reference: ${UPLOAD_MAX_FILES:10}
    allowed-content-types:
      - application/pdf
      - image/png
      - image/jpeg
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/msword
# ============================================

# Logging
# ============================================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
# ============================================

# Swagger / OpenAPI
# ============================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
# ============================================

# Actuator / Health
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
      threshold: 500MB
    mail:
      enabled: true
